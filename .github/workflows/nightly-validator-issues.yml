name: Nightly Validator Issues

on:
  schedule:
    - cron: "35 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-validator-issues-${{ github.repository }}
  cancel-in-progress: true

jobs:
  sync-validator-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout volume
        uses: actions/checkout@v4
        with:
          path: volume

      - name: Checkout governance
        uses: actions/checkout@v4
        with:
          repository: wsollers/lra-governance
          path: lra-governance

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install validator dependencies
        run: python -m pip install pyyaml

      - name: Run full validator
        run: python lra-governance/tools/governance/validate_volume.py volume --json validator-report.json || true

      - name: Sync GitHub issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python lra-governance/tools/governance/github_validator_issues.py --report validator-report.json --repo "${{ github.repository }}" --commit "${{ github.sha }}" --run-url "$RUN_URL" --close-stale

      - name: Upload validator report
        uses: actions/upload-artifact@v4
        with:
          name: validator-report
          path: validator-report.json
