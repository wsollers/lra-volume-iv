name: Sync volume-iv to monorepo

on:
  push:
    branches: [main]
    paths:
      - 'volume-iv/**'
      - 'bibliography/volume-iv-algebra.bib'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lra-volume-iv
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: wsollers/Learning-Real-Analysis
          token: ${{ secrets.SYNC_PAT }}
          path: monorepo

      - name: Validate volume bibliography
        run: |
          cd source
          python scripts/check_bibliography.py --bib-dir bibliography

      - name: Validate leaf proof stubs
        run: |
          cd source
          python scripts/validate_leaf_proofs.py --root . --strict

      - name: Sync volume-iv/ into monorepo
        run: |
          rsync -av --delete source/volume-iv/ monorepo/volume-iv/

      - name: Sync volume-iv bibliography into monorepo
        run: |
          mkdir -p monorepo/bibliography
          cp source/bibliography/volume-iv-algebra.bib monorepo/bibliography/volume-iv-algebra.bib

      - name: Commit and push if changed
        run: |
          cd monorepo
          git config user.name  "lra-sync-bot"
          git config user.email "sync-bot@noreply.github.com"
          git add volume-iv/ bibliography/volume-iv-algebra.bib
          git diff --cached --quiet && echo "No changes to sync" && exit 0
          git commit -m "chore: sync volume-iv from lra-volume-iv"
          git push